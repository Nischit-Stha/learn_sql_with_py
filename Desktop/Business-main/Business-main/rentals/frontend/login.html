<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veera Rentals Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            color: #111827;
            margin-bottom: 0.5rem;
        }
        p {
            color: #6b7280;
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1f2937;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #ffd700;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 1rem;
            background: #ffd700;
            color: #1a1a1a;
            cursor: pointer;
        }
        button:hover { background: #ffed4e; }
        .error {
            margin-top: 0.8rem;
            color: #dc2626;
            font-size: 0.9rem;
            display: none;
        }
        .note {
            margin-top: 1rem;
            font-size: 0.82rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p>Enter password to access Veera Rentals backend dashboard.</p>

        <form id="admin-login-form">
            <label for="admin-password">Password</label>
            <input id="admin-password" type="password" placeholder="Enter admin password" required>
            <button type="submit">Access Dashboard</button>
            <div id="login-error" class="error">Incorrect password. Please try again.</div>
        </form>

        <p class="note">Default password is configured in this file. Change it before production use.</p>
    </div>

    <script>
        const ADMIN_AUTH_KEY = 'veera_admin_auth';
        const ADMIN_PASSWORD = 'Veera@2026';

        const params = new URLSearchParams(window.location.search);
        const nextPath = params.get('next') || 'index.html';

        if (sessionStorage.getItem(ADMIN_AUTH_KEY) === 'true') {
            window.location.replace(nextPath);
        }

        document.getElementById('admin-login-form').addEventListener('submit', function (event) {
            event.preventDefault();
            const input = document.getElementById('admin-password').value;
            const errorBox = document.getElementById('login-error');

            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem(ADMIN_AUTH_KEY, 'true');
                window.location.replace(nextPath);
                return;
            }

            errorBox.style.display = 'block';
        });
    </script>
</body>
</html>
